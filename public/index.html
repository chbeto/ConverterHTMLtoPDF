<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML → PDF</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { margin-bottom: 4px; }
    p.sub { color: #666; margin-top: 0; }
    textarea { width: 100%; height: 260px; font-family: ui-monospace, monospace; font-size: 13px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    .row { display: flex; gap: 12px; align-items: center; margin: 12px 0; flex-wrap: wrap; }
    input[type=text] { padding: 8px; border: 1px solid #ccc; border-radius: 8px; }
    button { background: #111; color: #fff; border: 0; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; }
    button:disabled { opacity: .5; cursor: default; }
    code { background: #f3f3f3; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>HTML → PDF</h1>
  <p class="sub">Cole seu HTML, gere e baixe o PDF. Endpoint: <code>POST /convert</code></p>

  <textarea id="html">&lt;h1&gt;Olá, mundo!&lt;/h1&gt;
&lt;p&gt;Este PDF foi gerado a partir de HTML.&lt;/p&gt;</textarea>

  <div class="row">
    <input type="text" id="filename" value="documento.pdf" />
    <label><input type="checkbox" id="landscape" /> Paisagem</label>
    <button id="go">Gerar e baixar PDF</button>
  </div>

  <script>
    const btn = document.getElementById("go");
    btn.addEventListener("click", async () => {
      btn.disabled = true; btn.textContent = "Gerando...";
      try {
        const resp = await fetch("/convert", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            html: document.getElementById("html").value,
            filename: document.getElementById("filename").value,
            options: { landscape: document.getElementById("landscape").checked },
          }),
        });
        if (!resp.ok) throw new Error((await resp.json()).error || resp.statusText);
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = document.getElementById("filename").value || "documento.pdf";
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert("Erro: " + e.message);
      } finally {
        btn.disabled = false; btn.textContent = "Gerar e baixar PDF";
      }
    });
  </script>
</body>
</html>
